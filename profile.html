<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User Profile</title>
  <link rel="stylesheet" href="css/profile.css">
</head>
<body class="profile-page">
   
    <header class="profile">

      <div class="profile-info">

        <img src="media/profile-picture.png" class="default-pic">
        <h2 id="username"></h2>

        <div id="stats-header">
        <div class="stat">
          <span id="posts-count">0</span>
          <p>Posts</p>
        </div>

        <div class="stat">
          <span id="followers-count">0</span>
          <p>Followers</p>
        </div>

        <div class="stat">
          <span id="following-count">0</span>
          <p>Following</p>
        </div>
      </div>


        <p id="bio">This is the user bio. A short description about the user goes here.</p>
        
        <button id="edit">Edit Profile</button>

      </div>


    </header>

    <div id="edit-window">

        <div class="window-content">
          <h3>Edit Profile</h3>

          <input type="text" id="editFullname" placeholder="Full Name">
          <input type="text" id="editUsername" placeholder="Username">
          <input type="email" id="editEmail" placeholder="Email">
          <input type="text" id="editPhone" placeholder="Phone">
          <textarea id="editBio" placeholder="Bio"></textarea>

          <div class="window-buttons">
            <button id="save">Save</button>
            <button id="cancel">Cancel</button>

    </div>
  </div>
</div>


    
    <section>

      <div id="my-posts"></div>

    </section>

    <footer>
      <nav id="nav-bars">
        <a href="profile.html"> <img src="media/person.png" class="icon"> </a>
        <a href="home.html"> <img src="media/home.png" class="icon"> </a>
        <a href="setting.html"> <img src="media/setting.png" class="icon"> </a>
        <a href="search.html"> <img src="media/search.png" class="icon"> </a>
      </nav>

    </footer>

    <script src="js/merged.js"></script>

 


</body>
</html>

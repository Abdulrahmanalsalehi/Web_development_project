<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User Profile</title>
  <link rel="stylesheet" href="css/profile.css">
</head>
<body class="profile-page">
   
    <header class="profile">

      <div class="profile-info">

        <img src="media/profile-picture.png" class="default-pic">
        <h2 id="username">@username</h2>
        <p id="bio">This is the user bio. A short description about the user goes here.</p>
        
        <button id="edit">Edit Profile</button>

      </div>


    </header>

    <div id="edit-window">

        <div class="window-content">
          <h3>Edit Profile</h3>

          <input type="text" id="editFullname" placeholder="Full Name">
          <input type="text" id="editUsername" placeholder="Username">
          <input type="email" id="editEmail" placeholder="Email">
          <input type="text" id="editPhone" placeholder="Phone">
          <textarea id="editBio" placeholder="Bio"></textarea>

          <div class="window-buttons">
            <button id="save">Save</button>
            <button id="cancel">Cancel</button>

    </div>
  </div>
</div>


    
    <section class="posts">

      <div class="post">
        <img src="media/profile-picture.png" class="default-pic-post"> 

        <div class="post-header">
          <span class="post-username">@username</span>
          <span class="post-time">· 2h</span>
        </div>

        <p class="post-content">This is the first post content. It looks similar to X app style.</p>
        <button class="like"> <img src="media/heart.svg"></button>
        <button class="comment"> <img src="media/message-circle.svg"></button>
      </div>

    </section>

    <footer>

    </footer>

    <script src="js/script.js"></script>


</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MyApp</title>
  <link rel="stylesheet" href="css/home.css">
</head>

<body class="home-page">

  <header class="home-header">

      <div id="pic-header">
        <a href="profile.html"> <img id="profile-pic" src="media/profile-picture.png"> </a>
        <span id="username-header"></span>
      </div>

      
      <div id="stats-header">
        <div class="stat">
          <span id="posts-count">0</span>
          <p>Posts</p>
        </div>

        <div class="stat">
          <span id="followers-count">0</span>
          <p>Followers</p>
        </div>

        <div class="stat">
          <span id="following-count">0</span>
          <p>Following</p>
        </div>
      </div>
          
      <div id="logout-header">
        <a href="login.html"> <img src="media/log-out.svg"> </a>
      </div>

  </header>
  
  <section>

    <div id="create-post">
      <textarea id="post-input" placeholder="Post something here...?"></textarea>
      <button id="post-button">Post</button>
    </div>

    <div class="feed" id="feed"></div>



  </section>
  
  


  

  <footer>
      <nav id="nav-bars">
      <a href="profile.html"> <img src="media/person.png" class="icon"> </a>
      <a href="home.html"> <img src="media/home.png" class="icon"> </a>
      <a href="setting.html"> <img src="media/setting.png" class="icon"> </a>
      <a href="search.html"> <img src="media/search.png" class="icon"> </a>
        

      </nav>

    </footer>

    <script src="js/home.js"></script>


</body>
</html>

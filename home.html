<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MyApp</title>
  <link rel="stylesheet" href="css/home.css">
</head>

<body class="home-page">

  <header class="home-header">

      <div id="pic-header">
        <a href="profile.html"> <img id="profile-pic" src="media/profile-picture.png"> </a>
        <span id="username-header"></span>
      </div>

      
      <div id="stats-header">
        <div class="stat">
          <span id="posts-count">0</span>
          <p>Posts</p>
        </div>

        <div class="stat">
          <span id="followers-count">0</span>
          <p>Followers</p>
        </div>

        <div class="stat">
          <span id="following-count">0</span>
          <p>Following</p>
        </div>
      </div>
          
      <div id="logout-window"> 
        <div id="logout-popup">
            <p> Are you sure you want to logout ?</p>
            <div id="buttons"> 
              <button id="Yes"> Yes </button> 
              <button id="No"> No </button>
            </div>
        </div>
      </div>
      
      <div id="logout-header">
         <img src="media/log-out.svg"> 
      </div>
      

  </header>
  
  <section>
    <div id="create-post">
      <textarea id="post-input" placeholder="What's on your mind?"></textarea>
      <button id="post-button">Post</button>
    </div>
  </section>

  <section>
    <div class="feed" id="feed"></div>
  </section>


  <section>
    <div id="post-window">

      <div id="post-window-content">

        <div id="arrow-back">
          <img src="media/chevron-left.svg">
        </div>

        <div class="post-header">
          <img id="detail-profile-pic" class="default-pic-post">
          <div>
            <div id="detail-username" class="post-username"></div>
            <div id="detail-timestamp" class="timestamp"></div>
          </div>
        </div>

        <div id="detail-content" class="box-inside-window"></div>

        <div class="post-actions">
          <button id="detail-like" class="like"> 
            <img src="media/heart.svg"> 
            <span id="like-count">0</span>
          </button>
          <button id="detail-comment" class="comment"> 
            <img src="media/message-circle.svg"> 
            <span id="comment-count">0</span>
          </button>
        </div>

        <div id="comments-section">
          <p class="comments-title">Comments</p>

            <div id="comments-list"></div>

            <div class="add-comment">
                <textarea id="comment-input" placeholder="Write a comment..."></textarea>
                <button id="comment-button">Reply</button>
          </div>
        </div>

      </div>
    </div>

  </section>




  
  
  


  

  <footer>
      <nav id="nav-bars">
      <a href="profile.html"> <img src="media/person.png" class="icon" height="35px"> </a>
      <a href="home.html"> <img src="media/home.png" class="icon"> </a>
      <a href="setting.html"> <img src="media/setting.png" class="icon"> </a>
      <a href="search.html"> <img src="media/search.png" class="icon"> </a>
        

      </nav>

    </footer>

    <script src="js/home.js"></script>


</body>
</html>
